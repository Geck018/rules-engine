name: Rules freshness check

on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe publishers + update manifest
        run: node scripts/check-rules-updates.mjs --apply || true

      - name: Commit manifest/dataset changes (if any)
        run: |
          if [ -n "$(git status --porcelain public/data)" ]; then
            git config user.name "rules-bot"
            git config user.email "rules-bot@users.noreply.github.com"
            git add public/data
            git commit -m "Update rules manifest/datasets from weekly freshness check"
            git push
          else
            echo "No rules changes."
          fi
